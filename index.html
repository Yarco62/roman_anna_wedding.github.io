<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Роман & Анна — 18.08.2026</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{
    background:#3d4a2a;
    overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
  }
  .page{
    max-width:430px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
  }
  .page img{
    width:100%;
    display:block;
    /* remove any tiny gaps between images */
    margin:0;
    padding:0;
    border:0;
    vertical-align:bottom;
  }
  /* Subtle fade-in on load */
  .page{
    animation:fadeIn 1s ease-out;
  }
  @keyframes fadeIn{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
  }
</style>
</head>
<body>
<div class="page">
  <img src="Mobile 2.png" alt="Роман и Анна — Приглашение">
  <img src="Mobile 5.png" alt="Банкет">
  <img src="Mobile 4.png" alt="Дресс код">
  <img src="Mobile 3.png" alt="С любовью, Роман и Анна">
</div>
</body>
</html>
